name: Sync Release (stable tags)

# Part A: daily, detect upstream release tags (v*) missing from the fork.
# For each missing tag (oldest first): rebase the overlay onto the tag, push the
# fork tag vX.Y.Z (overlay + upstream tag, no suffix), and dispatch build.yml with
# skip_promote=true to build and publish the stable release. Meta is NOT touched.
# On rebase conflict, open a PR asking a human to resolve and stop the loop.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Build missing upstream tags onto the overlay
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          UPSTREAM: https://github.com/MetaCubeX/mihomo.git
          # Oldest release we care about. Prevents backfilling ~100 historical tags
          # (which predate the overlay and would only conflict). Bump as desired.
          MIN_TAG: v1.19.27
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$UPSTREAM" 2>/dev/null || git remote set-url upstream "$UPSTREAM"
          git fetch --no-tags origin \
            "+refs/heads/feat/xmihomo:refs/remotes/origin/feat/xmihomo"
          git fetch --no-tags upstream "+refs/heads/Alpha:refs/remotes/upstream/Alpha"

          # Release tags present upstream but missing from the fork, oldest first.
          list() { git ls-remote --tags "$1" 'v*' \
            | sed -E 's#.*refs/tags/##; /\^\{\}$/d' | sort -u; }
          list origin > /tmp/fork
          # grep -vxF: upstream tags not present verbatim in the fork tag list.
          list upstream | grep -vxF -f /tmp/fork | sort -V > /tmp/missing_all || true

          # Keep only tags >= MIN_TAG (version compare), preserving oldest-first order.
          : > /tmp/missing
          while read -r t; do
            [ -n "$t" ] || continue
            low=$(printf '%s\n%s\n' "$MIN_TAG" "$t" | sort -V | head -1)
            [ "$low" = "$MIN_TAG" ] && printf '%s\n' "$t" >> /tmp/missing
          done < /tmp/missing_all

          if [ ! -s /tmp/missing ]; then
            echo "No missing upstream release tags."
            exit 0
          fi
          echo "Missing tags:"; cat /tmp/missing

          base=$(git merge-base origin/feat/xmihomo upstream/Alpha)

          while read -r T; do
            [ -n "$T" ] || continue
            echo "::group::Release $T"
            # Fetch upstream tag into a private namespace (NOT refs/tags/) so the
            # name is free for our own `git tag "$T" rel` below.
            git fetch --no-tags upstream "+refs/tags/${T}:refs/rel-src/${T}"
            git checkout -B rel origin/feat/xmihomo

            if ! git rebase --onto "refs/rel-src/${T}" "$base" rel; then
              git rebase --abort || true
              snap="sync/release-${T}"
              git push origin "refs/rel-src/${T}:refs/heads/${snap}" --force
              if [ -z "$(gh pr list --head "$snap" --state open --json number -q '.[0].number')" ]; then
                gh pr create --base feat/xmihomo --head "$snap" \
                  --title "⚠️ Release sync: overlay rebase conflict onto ${T}" \
                  --body "$(printf '%s\n' \
                    "Automated overlay rebase onto \`${T}\` hit a conflict; release sync is halted at this tag until resolved." \
                    '' \
                    'Resolve locally, then push the fork tag and dispatch the build:' \
                    '```' \
                    "git fetch --all --tags" \
                    "git checkout -B rel origin/feat/xmihomo" \
                    "git rebase --onto ${T} \$(git merge-base origin/feat/xmihomo upstream/Alpha) rel" \
                    '# resolve conflicts, git rebase --continue' \
                    "git tag ${T} rel && git push origin ${T}" \
                    "gh workflow run build.yml --ref ${T} -f version=${T} -f skip_promote=true" \
                    '```' \
                    'Then close this PR. Later tags are not processed until this is done.')"
              fi
              echo "::error::Overlay rebase conflict onto ${T} — see PR. Stopping."
              exit 1
            fi

            git tag "$T" rel
            git push origin "refs/tags/${T}"
            gh workflow run build.yml --ref "$T" -f version="$T" -f skip_promote=true
            echo "Dispatched stable build for ${T}."
            echo "::endgroup::"
          done < /tmp/missing
