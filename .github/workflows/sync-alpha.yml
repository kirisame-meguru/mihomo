name: Sync Alpha (prerelease)

# Part B: every 2h, mirror upstream Alpha, rebase the fork overlay onto it,
# push feat/xmihomo + Alpha + Meta, and let build.yml produce Prerelease-Alpha.
# On rebase conflict, open a PR asking a human to resolve and stop.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: sync-alpha
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Rebase overlay onto upstream Alpha and promote
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          # Pin gh to the fork; the checkout adds an `upstream` remote, which gh
          # would otherwise pick as the default repo (PR 403 on upstream).
          GH_REPO: ${{ github.repository }}
          UPSTREAM: https://github.com/MetaCubeX/mihomo.git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$UPSTREAM" 2>/dev/null || git remote set-url upstream "$UPSTREAM"
          git fetch --no-tags origin \
            "+refs/heads/feat/xmihomo:refs/remotes/origin/feat/xmihomo" \
            "+refs/heads/Alpha:refs/remotes/origin/Alpha"
          git fetch --no-tags upstream "+refs/heads/Alpha:refs/remotes/upstream/Alpha"

          base=$(git merge-base origin/feat/xmihomo upstream/Alpha)
          git checkout -B work origin/feat/xmihomo

          if ! git rebase --onto upstream/Alpha "$base" work; then
            git rebase --abort || true
            snap="sync/alpha-$(git rev-parse --short upstream/Alpha)"
            git push origin "upstream/Alpha:refs/heads/${snap}" --force
            if [ -n "$(gh pr list --head "$snap" --state open --json number -q '.[0].number')" ]; then
              echo "Conflict PR for ${snap} already open; nothing more to do."
              exit 0
            fi
            gh pr create --base feat/xmihomo --head "$snap" \
              --title "⚠️ Alpha sync: overlay rebase conflict onto upstream/Alpha" \
              --body "$(printf '%s\n' \
                'Automated overlay rebase onto \`upstream/Alpha\` hit a conflict; Alpha sync is halted until resolved.' \
                '' \
                'Resolve locally, then force-push \`feat/xmihomo\`:' \
                '```' \
                'git fetch --all --tags' \
                'git checkout -B fix origin/feat/xmihomo' \
                'git rebase --onto upstream/Alpha $(git merge-base origin/feat/xmihomo upstream/Alpha) fix' \
                '# resolve conflicts, git rebase --continue' \
                'git push origin fix:feat/xmihomo --force' \
                '```' \
                'Then close this PR and delete the snapshot branch.')"
            echo "::error::Alpha overlay rebase conflict — see PR."
            exit 1
          fi

          if [ "$(git rev-parse work)" = "$(git rev-parse origin/Alpha)" ]; then
            echo "Alpha already up to date with rebased overlay; nothing to do."
            exit 0
          fi

          # feat/xmihomo (authoring) + Alpha (build source) + Meta (rolling) all track the overlay.
          git push origin work:refs/heads/feat/xmihomo --force
          git push origin work:refs/heads/Meta --force
          # Push Alpha last: this is the trigger for build.yml -> Prerelease-Alpha.
          git push origin work:refs/heads/Alpha --force
